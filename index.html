<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etimesgut Kurban Hizmetleri 2026 — Memnuniyet Anketi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1e1a;
    --bg2:#14302a;
    --card:#fbf7ee;
    --ink:#1d2b27;
    --muted:#5e6f6a;
    --accent:#2f7d62;
    --accent-soft:#e3efe8;
    --gold:#c79a3d;
    --line:#e2dccd;
    --radius:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Mulish',sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 600px at 80% -10%, #1c4639 0%, transparent 60%),
      linear-gradient(160deg,var(--bg) 0%, var(--bg2) 100%);
    min-height:100vh;
    padding:32px 16px 64px;
    line-height:1.55;
  }
  .wrap{max-width:680px;margin:0 auto}
  .header{
    text-align:center;
    color:#f3ede0;
    margin-bottom:28px;
  }
  .header .crest{
    font-size:34px;letter-spacing:.05em;
    color:var(--gold);
    margin-bottom:6px;
  }
  .header .year{
    display:inline-block;
    font-family:'Mulish';font-weight:700;
    font-size:12px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--gold);
    border:1px solid rgba(199,154,61,.45);
    border-radius:999px;
    padding:5px 14px;margin-bottom:16px;
  }
  .header h1{
    font-family:'Fraunces',serif;
    font-weight:600;font-size:clamp(24px,5vw,34px);
    line-height:1.15;
  }
  .header p{color:#aebcb6;margin-top:10px;font-size:15px}

  .card{
    background:var(--card);
    border-radius:var(--radius);
    padding:clamp(20px,4vw,34px);
    box-shadow:0 24px 60px -20px rgba(0,0,0,.55);
  }

  .q{padding:22px 0;border-bottom:1px solid var(--line)}
  .q:first-of-type{padding-top:4px}
  .q-num{
    font-family:'Fraunces',serif;font-style:italic;
    color:var(--accent);font-weight:600;font-size:14px;
    margin-right:6px;
  }
  .q-text{font-weight:600;font-size:16px;margin-bottom:14px;display:block}
  .req{color:#b9442f}

  /* Likert */
  .likert{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
  .likert label{
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    gap:8px;
    border:1px solid var(--line);border-radius:14px;
    padding:12px 6px;cursor:pointer;
    background:#fff;
    transition:all .15s ease;
    text-align:center;min-height:84px;
  }
  .likert input{position:absolute;opacity:0;pointer-events:none}
  .likert .dot{
    width:22px;height:22px;border-radius:50%;
    border:2px solid #c2ccc7;flex:none;
    transition:all .15s ease;
  }
  .likert .lab{font-size:11px;color:var(--muted);font-weight:600;line-height:1.25}
  .likert label:hover{border-color:var(--accent);background:var(--accent-soft)}
  .likert input:checked + .dot{
    border-color:var(--accent);
    background:var(--accent);
    box-shadow:inset 0 0 0 4px #fff;
  }
  .likert label:has(input:checked){
    border-color:var(--accent);
    background:var(--accent-soft);
  }
  .likert label:has(input:checked) .lab{color:var(--accent)}

  /* text inputs */
  input[type=tel],textarea{
    width:100%;font-family:inherit;font-size:15px;color:var(--ink);
    border:1px solid var(--line);border-radius:12px;
    padding:13px 14px;background:#fff;
    transition:border-color .15s;
  }
  input[type=tel]:focus,textarea:focus{outline:none;border-color:var(--accent)}
  textarea{min-height:110px;resize:vertical}

  .submit{
    width:100%;margin-top:26px;
    font-family:'Mulish';font-weight:700;font-size:16px;letter-spacing:.02em;
    color:#fff;background:var(--accent);
    border:none;border-radius:14px;padding:16px;cursor:pointer;
    transition:transform .12s, background .2s;
  }
  .submit:hover{background:#266750}
  .submit:active{transform:scale(.99)}
  .submit:disabled{opacity:.6;cursor:not-allowed}

  .thanks{
    display:none;text-align:center;padding:40px 10px;
  }
  .thanks .check{
    width:64px;height:64px;border-radius:50%;
    background:var(--accent-soft);color:var(--accent);
    display:flex;align-items:center;justify-content:center;
    font-size:32px;margin:0 auto 18px;
  }
  .thanks h2{font-family:'Fraunces',serif;font-weight:600;font-size:24px;margin-bottom:10px}
  .thanks p{color:var(--muted)}

  .foot{text-align:center;color:#8b9a94;font-size:12px;margin-top:22px}

  @media(max-width:480px){
    .likert{grid-template-columns:repeat(5,1fr);gap:5px}
    .likert label{padding:10px 3px;min-height:96px}
    .likert .lab{font-size:10px}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="crest">۞</div>
    <span class="year">2026 Memnuniyet Anketi</span>
    <h1>Etimesgut Kurban Hizmetleri</h1>
    <p>Görüşleriniz hizmetlerimizi geliştirmemiz için çok değerli.</p>
  </div>

  <div class="card">
    <form id="surveyForm">
      <div id="questions"></div>

      <div class="q" style="border-bottom:none">
        <label class="q-text"><span class="q-num">7.</span>Kurbanınızı 2027 yılında bizimle kesmek istiyorsanız sizi aramamız için telefonunuzu yazar mısınız?</label>
        <input type="tel" name="telefon" placeholder="05XX XXX XX XX" autocomplete="tel">
      </div>

      <div class="q" style="border-bottom:none;padding-top:0">
        <label class="q-text"><span class="q-num">8.</span>Teklif ve önerilerinizi bizimle paylaşır mısınız?</label>
        <textarea name="oneriler" placeholder="Görüş, teklif ve önerileriniz..."></textarea>
      </div>

      <button type="submit" class="submit" id="submitBtn">Anketi Gönder</button>
    </form>

    <div class="thanks" id="thanks">
      <div class="check">✓</div>
      <h2>Teşekkür ederiz</h2>
      <p>Vakit ayırarak anketimizi doldurduğunuz için teşekkür ederiz.</p>
    </div>
  </div>

  <div class="foot">Etimesgut Kurban Hizmetleri · 2026</div>
</div>

<script>
  // ⬇️ Apps Script web app URL'sini buraya yapıştır
  const SCRIPT_URL = "BURAYA_APPS_SCRIPT_URL";

  const likertQuestions = [
    "Kurban organizasyonumuzdan memnun musunuz?",
    "Bilgilendirme ve takip sistemimizden memnun musunuz?",
    "Kurban fiyatlarımızdan memnun musunuz?",
    "Kurban teslimatımızdan memnun musunuz?",
    "Kurban organizasyonumuzu bir başkasına önerir misiniz?",
    "Kurbanınızı 2027 yılında da bizimle kesmek ister misiniz?"
  ];
  const scale = [
    "Kesinlikle Katılmıyorum",
    "Katılmıyorum",
    "Kısmen Katılıyorum",
    "Katılıyorum",
    "Kesinlikle Katılıyorum"
  ];

  const qContainer = document.getElementById('questions');
  likertQuestions.forEach((q, i) => {
    const name = "soru" + (i + 1);
    let opts = "";
    scale.forEach((s, j) => {
      opts += `<label>
        <input type="radio" name="${name}" value="${j + 1}" required>
        <span class="dot"></span>
        <span class="lab">${s}</span>
      </label>`;
    });
    qContainer.insertAdjacentHTML('beforeend', `
      <div class="q">
        <label class="q-text"><span class="q-num">${i + 1}.</span>${q} <span class="req">*</span></label>
        <div class="likert">${opts}</div>
      </div>`);
  });

  const form = document.getElementById('surveyForm');
  const btn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    btn.disabled = true;
    btn.textContent = "Gönderiliyor...";

    const data = {};
    new FormData(form).forEach((v, k) => data[k] = v);

    try {
      await fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(data)
      });
      form.style.display = "none";
      document.getElementById('thanks').style.display = "block";
    } catch (err) {
      btn.disabled = false;
      btn.textContent = "Anketi Gönder";
      alert("Gönderim sırasında bir hata oluştu. Lütfen tekrar deneyin.");
    }
  });
</script>
</body>
</html>
